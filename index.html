                    <p class="mt-2 text-center" style="color:var(--text-light);">Showing last 100 entries.</p>
                `;
            }

            render(html);
        }

        // ======================================================================
        //  TEACHER: MY CLASSES
        // ======================================================================
        function renderMyClasses() {
            const db = getDB();
            if (db.session.role !== 'teacher') { renderDashboard(); return; }

            const teacher = db.teachers.find(t => t.email === db.session.email);
            if (!teacher) { render(`<div class="empty-state"><p>Teacher profile not found.</p></div>`); return; }

            const classIds = teacher.classIds || [];
            const myClasses = db.classes.filter(c => classIds.includes(c.id));

            let html = `
                <div class="page-header">
                    <h2><i class="fas fa-users"></i> My Classes</h2>
                    <p>Classes assigned to you.</p>
                </div>
            `;

            if (myClasses.length === 0) {
                html += `<div class="empty-state"><i class="fas fa-users"></i><p>No classes assigned yet. Contact the Head Teacher.</p></div>`;
            } else {
                myClasses.forEach(cls => {
                    const students = db.students.filter(s => s.classId === cls.id);
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-users"></i> ${cls.name}</h3>
                                <span class="badge badge-primary">${students.length} students</span>
                            </div>
                            ${students.length === 0 ? '<p class="text-center" style="color:var(--text-light);">No students in this class.</p>' :
                            `<div class="table-wrap">
                                <table>
                                    <thead><tr><th>#</th><th>Adm No.</th><th>Name</th><th>Gender</th></tr></thead>
                                    <tbody>
                                        ${students.map((s, i) => `<tr><td>${i+1}</td><td>${s.admNo || '—'}</td><td>${s.name}</td><td>${s.gender || '—'}</td></tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>`}
                        </div>
                    `;
                });
            }

            render(html);
        }

        // ======================================================================
        //  TEACHER: ENTER MARKS
        // ======================================================================
        function renderEnterMarks() {
            const db = getDB();
            if (db.session.role !== 'teacher') { renderDashboard(); return; }

            const teacher = db.teachers.find(t => t.email === db.session.email);
            if (!teacher) { render(`<div class="empty-state"><p>Teacher profile not found.</p></div>`); return; }

            const classIds = teacher.classIds || [];
            const subjectIds = teacher.subjectIds || [];
            const myExams = db.exams.filter(e => classIds.includes(e.classId) && subjectIds.includes(e.subjectId));

            let html = `
                <div class="page-header">
                    <h2><i class="fas fa-pencil"></i> Enter Marks</h2>
                    <p>Record scores for your exams and tests. UNEB grading applied automatically.</p>
                </div>
            `;

            if (myExams.length === 0) {
                html += `
                    <div class="empty-state"><i class="fas fa-pencil"></i>
                        <p>No exams available for your classes/subjects. Head Teacher must create exams first.</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="card">
                        <div class="card-header"><h3>Select Assessment</h3></div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Choose Exam / Test</label>
                                <select class="form-control" id="mark-exam-select" onchange="loadMarkEntry()">
                                    <option value="">— Select —</option>
                                    ${myExams.map(e => {
                                        const cls = db.classes.find(c => c.id === e.classId);
                                        const sub = db.subjects.find(s => s.id === e.subjectId);
                                        return `<option value="${e.id}">${e.name} — ${cls?cls.name:'?'} — ${sub?sub.name:'?'}</option>`;
                                    }).join('')}
                                </select>
                            </div>
                        </div>
                    </div>
                    <div id="mark-entry-area"></div>
                `;
            }

            render(html);
        }

        function loadMarkEntry() {
            const examId = Number(document.getElementById('mark-exam-select').value);
            if (!examId) { document.getElementById('mark-entry-area').innerHTML = ''; return; }

            const db = getDB();
            const exam = db.exams.find(e => e.id === examId);
            if (!exam) return;

            const students = db.students.filter(s => s.classId === exam.classId);
            if (students.length === 0) {
                document.getElementById('mark-entry-area').innerHTML =
                    `<div class="alert alert-warning">No students in this class.</div>`;
                return;
            }

            let html = `
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-edit"></i> ${exam.name}</h3>
                        <span class="badge badge-accent">${students.length} students</span>
                    </div>
                    <form id="marksForm">
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>#</th><th>Student</th><th>Score (0-100)</th><th>Grade</th><th>Remark</th><th>Comment</th></tr></thead>
                                <tbody>
                                    ${students.map((s, i) => {
                                        const existing = db.marks.find(m => m.studentId === s.id && m.examId === examId);
                                        const score = existing ? existing.score : '';
                                        const comment = existing ? existing.comment : '';
                                        const g = getGrade(score);
                                        return `<tr>
                                            <td>${i+1}</td>
                                            <td><strong>${s.name}</strong> <small style="color:var(--text-light)">(${s.admNo||'—'})</small></td>
                                            <td><input type="number" class="form-control" style="width:90px;display:inline-block;" min="0" max="100" 
                                                name="score-${s.id}" value="${score}" oninput="updateGrade(this, ${s.id}, '${examId}')" /></td>
                                            <td class="grade-cell-${s.id} ${gradeClass(g.grade)}"><strong>${g.grade}</strong></td>
                                            <td class="remark-cell-${s.id}">${g.remark}</td>
                                            <td><input class="form-control" style="width:160px;display:inline-block;" name="comment-${s.id}" value="${comment}" placeholder="Optional comment" /></td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                        <button type="submit" class="btn btn-primary mt-2"><i class="fas fa-save"></i> Save All Marks</button>
                    </form>
                </div>
            `;

            document.getElementById('mark-entry-area').innerHTML = html;

            // Attach submit
            document.getElementById('marksForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const db = getDB();
                const formData = new FormData(e.target);
                let count = 0;

                students.forEach(s => {
                    const scoreRaw = formData.get(`score-${s.id}`);
                    const comment = formData.get(`comment-${s.id}`) || '';
                    const score = scoreRaw === '' ? null : Number(scoreRaw);

                    // Remove existing mark for this student+exam
                    db.marks = db.marks.filter(m => !(m.studentId === s.id && m.examId === examId));

                    if (score !== null && !isNaN(score)) {
                        const g = getGrade(score);
                        db.marks.push({
                            id: genId('mark'),
                            studentId: s.id,
                            examId: examId,
                            score: score,
                            grade: g.grade,
                            remark: g.remark,
                            comment: comment
                        });
                        count++;
                    }
                });

                saveDB(db);
                toast(`Saved marks for ${count} students.`);
                loadMarkEntry(); // refresh
            });
        }

        // Live grade update as teacher types
        function updateGrade(input, studentId, examId) {
            const score = input.value === '' ? null : Number(input.value);
            const g = getGrade(score);
            const gradeCell = document.querySelector(`.grade-cell-${studentId}`);
            const remarkCell = document.querySelector(`.remark-cell-${studentId}`);
            if (gradeCell) {
                gradeCell.className = `grade-cell-${studentId} ${gradeClass(g.grade)}`;
                gradeCell.innerHTML = `<strong>${g.grade}</strong>`;
            }
            if (remarkCell) {
                remarkCell.textContent = g.remark;
            }
        }

        // ======================================================================
        //  REPORT CARDS
        // ======================================================================
        function renderReports() {
            const db = getDB();
            const isHT = db.session.role === 'headteacher';

            let html = `
                <div class="page-header">
                    <h2><i class="fas fa-file-alt"></i> Report Cards</h2>
                    <p>Generate student report cards with UNEB grades and comments.</p>
                </div>
                <div class="card">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Select Student</label>
                            <select class="form-control" id="report-student" onchange="previewReport()">
                                <option value="">— Choose —</option>
                                ${db.students.map(s => {
                                    const cls = db.classes.find(c => c.id === s.classId);
                                    return `<option value="${s.id}">${s.name} (${cls?cls.name:'—'})</option>`;
                                }).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Select Term</label>
                            <select class="form-control" id="report-term">
                                <option value="t1">Term 1</option>
                                <option value="t2">Term 2</option>
                                <option value="t3">Term 3</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-accent" onclick="previewReport()"><i class="fas fa-eye"></i> Preview Report</button>
                    <button class="btn btn-primary" onclick="printReport()" style="margin-left:8px;"><i class="fas fa-print"></i> Print</button>
                </div>
                <div id="report-preview-area"></div>
            `;

            render(html);
        }

        function previewReport() {
            const db = getDB();
            const studentId = Number(document.getElementById('report-student').value);
            const termId = document.getElementById('report-term').value;

            if (!studentId) {
                document.getElementById('report-preview-area').innerHTML =
                    `<div class="alert alert-info">Select a student to generate their report card.</div>`;
                return;
            }

            const student = db.students.find(s => s.id === studentId);
            if (!student) { document.getElementById('report-preview-area').innerHTML =
                `<div class="alert alert-danger">Student not found.</div>`; return; }

            const cls = db.classes.find(c => c.id === student.classId);
            const exams = db.exams.filter(e => e.term === termId && e.classId === student.classId);
            const term = db.terms.find(t => t.id === termId);

            let rows = '';
            let totalScore = 0;
            let count = 0;

            exams.forEach(exam => {
                const sub = db.subjects.find(s => s.id === exam.subjectId);
                const mark = db.marks.find(m => m.studentId === studentId && m.examId === exam.id);
                const score = mark ? mark.score : '—';
                const g = getGrade(score);
                const comment = mark ? (mark.comment || '') : '';
                if (score !== '—' && !isNaN(Number(score))) { totalScore += Number(score);
                    count++; }
                rows += `<tr>
                            <td>${exam.name}</td>
                            <td>${sub ? sub.name : '—'}</td>
                            <td class="text-center"><strong>${score}</strong></td>
                            <td class="text-center ${gradeClass(g.grade)}"><strong>${g.grade}</strong></td>
                            <td>${g.remark}</td>
                            <td>${comment || '—'}</td>
                        </tr>`;
            });

            if (!rows) {
                rows =
                    `<tr><td colspan="6" class="text-center" style="color:var(--text-light);">No assessments found for this term.</td></tr>`;
            }

            const avg = count > 0 ? (totalScore / count).toFixed(1) : '—';
            const avgGrade = getGrade(Number(avg));

            const html = `
                <div class="report-card" id="reportCardPrint">
                    <div class="rc-header">
                        <h2>${db.school.name}</h2>
                        <h3>${db.school.location} — ${db.school.type.toUpperCase()}</h3>
                        <p style="margin-top:6px;font-weight:600;">STUDENT REPORT CARD — ${term ? term.name : termId} ${db.currentYear}</p>
                    </div>
                    <div class="rc-student">
                        <div><strong>Student:</strong> ${student.name}</div>
                        <div><strong>Admission No:</strong> ${student.admNo || '—'}</div>
                        <div><strong>Class:</strong> ${cls ? cls.name : '—'}</div>
                        <div><strong>Gender:</strong> ${student.gender || '—'}</div>
                        <div><strong>Parent Contact:</strong> ${student.parentContact || '—'}</div>
                        <div><strong>Term Average:</strong> ${avg}% (Grade ${avgGrade.grade})</div>
                    </div>
                    <table>
                        <thead><tr><th>Assessment</th><th>Subject</th><th>Score</th><th>Grade</th><th>Remark</th><th>Comment</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="rc-comments">
                        <strong><i class="fas fa-comment"></i> Overall Performance:</strong>
                        <p style="margin-top:4px;">${avgGrade.remark} — Average score: ${avg}% (${avgGrade.grade})</p>
                    </div>
                    <div class="rc-footer">
                        <span><strong>Head Teacher:</strong> ${db.school.htName}</span>
                        <span><strong>Date:</strong> ${new Date().toLocaleDateString()}</span>
                    </div>
                </div>
            `;

            document.getElementById('report-preview-area').innerHTML = html;
        }

        function printReport() {
            const content = document.getElementById('reportCardPrint');
            if (!content) { toast('Generate a report preview first.', 'warning'); return; }
            const win = window.open('', '', 'width=800,height=600');
            win.document.write(`
                <html><head><title>Report Card</title>
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
                <style>
                    body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
                    .report-card { max-width: 800px; margin: 0 auto; border: 2px solid #1a5e2a; padding: 32px; border-radius: 12px; }
                    .rc-header { text-align: center; border-bottom: 3px double #1a5e2a; padding-bottom: 16px; margin-bottom: 20px; }
                    .rc-header h2 { color: #0f3d1c; }
                    .rc-student { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin-bottom: 20px; }
                    table { width: 100%; border-collapse: collapse; }
                    th { background: #1a5e2a; color: #fff; padding: 8px 12px; text-align: left; }
                    td { padding: 8px 12px; border-bottom: 1px solid #c8d8c8; }
                    .grade-A { color: #1a7a3a; font-weight:700; }
                    .grade-B { color: #2d8a3e; font-weight:600; }
                    .grade-C { color: #d4a800; font-weight:600; }
                    .grade-D { color: #e67e22; font-weight:600; }
                    .grade-E { color: #c0392b; font-weight:600; }
                    .grade-F { color: #a93226; font-weight:700; }
                    .rc-comments { margin-top: 16px; padding: 12px; background: #f9fbf9; border-left: 4px solid #1a5e2a; border-radius: 8px; }
                    .rc-footer { margin-top: 20px; display: flex; justify-content: space-between; border-top: 1px solid #c8d8c8; padding-top: 16px; }
                    .text-center { text-align: center; }
                    @media print { body { padding: 0; } }
                </style>
                </head><body>${content.outerHTML}</body></html>
            `);
            win.document.close();
            setTimeout(() => { win.print();
                win.close(); }, 500);
        }

        // ======================================================================
        //  SETTINGS
        // ======================================================================
        function renderSettings() {
            const db = getDB();
            const isHT = db.session.role === 'headteacher';
            if (!isHT) { renderDashboard(); return; }

            let html = `
                <div class="page-header">
                    <h2><i class="fas fa-cog"></i> Settings</h2>
                    <p>Manage school settings, term, and year.</p>
                </div>
                <div class="card">
                    <div class="card-title">School Information</div>
                    <p><strong>Name:</strong> ${db.school.name}</p>
                    <p><strong>Location:</strong> ${db.school.location}</p>
                    <p><strong>Type:</strong> ${db.school.type}</p>
                    <p><strong>Email:</strong> ${db.school.email}</p>
                    <p><strong>Head Teacher:</strong> ${db.school.htName}</p>
                </div>
                <div class="card">
                    <div class="card-title">Current Academic Period</div>
                    <form id="settingsForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Current Term</label>
                                <select class="form-control" id="set-term">
                                    ${db.terms.map(t => `<option value="${t.id}" ${t.id===db.currentTerm?'selected':''}>${t.name}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Academic Year</label>
                                <input class="form-control" id="set-year" type="number" value="${db.currentYear}" />
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Settings</button>
                    </form>
                </div>
                <div class="card">
                    <div class="card-title">Data Management</div>
                    <button class="btn btn-danger" onclick="resetAllData()"><i class="fas fa-trash-alt"></i> Reset All Data</button>
                    <p style="font-size:0.8rem;color:var(--text-light);margin-top:8px;">This will permanently delete all records.</p>
                </div>
            `;

            render(html);

            document.getElementById('settingsForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const db = getDB();
                db.currentTerm = document.getElementById('set-term').value;
                db.currentYear = Number(document.getElementById('set-year').value);
                saveDB(db);
                toast('Settings saved!');
            });
        }

        function resetAllData() {
            if (!confirm('ARE YOU SURE? This will delete ALL data — students, teachers, marks, exams, everything!')) return;
            if (!confirm('This is irreversible. Confirm again to proceed.')) return;
            localStorage.removeItem(DB_KEY);
            toast('All data has been reset.', 'warning');
            // Reload page to start fresh
            setTimeout(() => location.reload(), 800);
        }

        // ======================================================================
        //  INIT
        // ======================================================================
        function initApp() {
            const db = getDB();
            if (db && db.school && db.session) {
                // Already logged in
                enterApp();
            } else if (db && db.school && !db.session) {
                // School exists but no session — show login
                document.getElementById('auth-container').style.display = 'flex';
                showLogin();
            } else {
                // No school — show register
                document.getElementById('auth-container').style.display = 'flex';
                showRegister();
            }
        }

        // Make functions globally accessible for onclick
        window.navigateTo = navigateTo;
        window.showAddTeacherModal = showAddTeacherModal;
        window.deleteTeacher = deleteTeacher;
        window.editTeacher = editTeacher;
        window.resetTeacherPass = resetTeacherPass;
        window.showAddStudentModal = showAddStudentModal;
        window.deleteStudent = deleteStudent;
        window.editStudent = editStudent;
        window.promoteStudent = promoteStudent;
        window.showAddClassModal = showAddClassModal;
        window.deleteClass = deleteClass;
        window.editClass = editClass;
        window.showAddSubjectModal = showAddSubjectModal;
        window.deleteSubject = deleteSubject;
        window.seedSubjects = seedSubjects;
        window.showAddExamModal = showAddExamModal;
        window.deleteExam = deleteExam;
        window.loadMarkEntry = loadMarkEntry;
        window.updateGrade = updateGrade;
        window.previewReport = previewReport;
        window.printReport = printReport;
        window.renderSettings = renderSettings;
        window.resetAllData = resetAllData;
        window.closeModal = closeModal;

        // Boot
        initApp();
    </script>
</body>
</html>
