<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uganda School Management System</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ========== CSS Reset & Base ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a5e2a;
            --primary-light: #2d8a3e;
            --primary-dark: #0f3d1c;
            --accent: #f5c518;
            --accent-dark: #d4a800;
            --bg: #f0f4f0;
            --card: #ffffff;
            --text: #1e2a1e;
            --text-light: #4a5a4a;
            --border: #c8d8c8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --danger: #c0392b;
            --success: #1a7a3a;
            --warning: #d4a800;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.25s ease;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 8px;
        }

        /* ========== Utility ========== */
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mb-1 {
            margin-bottom: 8px;
        }
        .mb-2 {
            margin-bottom: 16px;
        }
        .mb-3 {
            margin-bottom: 24px;
        }
        .mt-2 {
            margin-top: 16px;
        }
        .mt-3 {
            margin-top: 24px;
        }
        .flex {
            display: flex;
        }
        .flex-wrap {
            flex-wrap: wrap;
        }
        .gap-2 {
            gap: 12px;
        }
        .gap-3 {
            gap: 20px;
        }
        .items-center {
            align-items: center;
        }
        .justify-between {
            justify-content: space-between;
        }

        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-primary {
            background: var(--primary);
            color: #fff;
        }
        .badge-accent {
            background: var(--accent);
            color: var(--text);
        }
        .badge-success {
            background: var(--success);
            color: #fff;
        }
        .badge-danger {
            background: var(--danger);
            color: #fff;
        }

        /* ========== Buttons ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }
        .btn-accent {
            background: var(--accent);
            color: var(--text);
        }
        .btn-accent:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: #a93226;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 0.7rem;
        }
        .btn-block {
            width: 100%;
            justify-content: center;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ========== Cards ========== */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--bg);
        }
        .card-header h2,
        .card-header h3 {
            font-size: 1.2rem;
            color: var(--primary-dark);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        /* ========== Form ========== */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            transition: var(--transition);
            font-family: var(--font);
            background: var(--card);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 94, 42, 0.15);
        }
        .form-control::placeholder {
            color: #aab;
        }
        select.form-control {
            cursor: pointer;
            appearance: auto;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 60px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }
        .form-hint {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* ========== Table ========== */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th,
        td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--primary-dark);
            color: #fff;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #f6faf6;
        }
        .table-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* ========== Auth Pages ========== */
        #auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f3d1c 0%, #1a5e2a 50%, #2d8a3e 100%);
            padding: 20px;
        }
        .auth-box {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
            animation: fadeUp 0.5s ease;
        }
        .auth-box .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-box .logo i {
            font-size: 3rem;
            color: var(--primary);
            background: var(--bg);
            padding: 16px;
            border-radius: 50%;
        }
        .auth-box .logo h1 {
            font-size: 1.6rem;
            color: var(--primary-dark);
            margin-top: 12px;
        }
        .auth-box .logo p {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .auth-toggle {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .auth-toggle a {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }
        .auth-toggle a:hover {
            text-decoration: underline;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== Dashboard Layout ========== */
        #app-container {
            display: none;
            min-height: 100vh;
        }
        #app-container.active {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--primary-dark);
            color: #fff;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .sidebar-brand {
            padding: 20px 18px;
            font-size: 1.2rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-brand i {
            font-size: 1.6rem;
            color: var(--accent);
        }
        .sidebar-brand span {
            font-size: 0.8rem;
            opacity: 0.7;
            display: block;
            font-weight: 400;
        }
        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.75);
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
            font-size: 0.9rem;
        }
        .sidebar-nav .nav-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .sidebar-nav .nav-item.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border-left-color: var(--accent);
        }
        .sidebar-nav .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
        }
        .sidebar-footer .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .sidebar-footer .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .sidebar-footer .user-info .name {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .sidebar-footer .user-info .role {
            opacity: 0.6;
            font-size: 0.7rem;
        }
        .sidebar-footer .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
            transition: var(--transition);
        }
        .sidebar-footer .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Main content */
        .main-content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            max-height: 100vh;
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h2 {
            font-size: 1.6rem;
            color: var(--primary-dark);
        }
        .page-header p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* ========== Dashboard Cards (stats) ========== */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px 18px;
            box-shadow: var(--shadow);
            text-align: center;
            border-left: 4px solid var(--primary);
        }
        .stat-card .stat-icon {
            font-size: 2rem;
            color: var(--primary-light);
            margin-bottom: 6px;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ========== Marks / Grade specific ========== */
        .grade-A {
            color: #1a7a3a;
            font-weight: 700;
        }
        .grade-B {
            color: #2d8a3e;
            font-weight: 600;
        }
        .grade-C {
            color: #d4a800;
            font-weight: 600;
        }
        .grade-D {
            color: #e67e22;
            font-weight: 600;
        }
        .grade-E {
            color: #c0392b;
            font-weight: 600;
        }
        .grade-F {
            color: #a93226;
            font-weight: 700;
        }

        .grade-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* ========== Report Card ========== */
        .report-card {
            background: #fff;
            border: 2px solid var(--primary);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: var(--shadow);
        }
        .report-card .rc-header {
            text-align: center;
            border-bottom: 3px double var(--primary);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }
        .report-card .rc-header h2 {
            color: var(--primary-dark);
            font-size: 1.4rem;
        }
        .report-card .rc-header h3 {
            color: var(--text-light);
            font-weight: 400;
            font-size: 1rem;
        }
        .report-card .rc-student {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 24px;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .report-card .rc-student strong {
            color: var(--text-light);
        }
        .report-card table {
            font-size: 0.85rem;
        }
        .report-card table th {
            background: var(--primary);
        }
        .report-card .rc-comments {
            margin-top: 16px;
            padding: 12px;
            background: #f9fbf9;
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--primary);
        }
        .report-card .rc-footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        /* ========== Modal ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }
        .modal-overlay.hidden {
            display: none;
        }
        .modal-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: scaleUp 0.25s ease;
        }
        .modal-box.wide {
            max-width: 720px;
        }
        .modal-box h3 {
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin-bottom: 16px;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }
        .modal-close:hover {
            color: var(--danger);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes scaleUp {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
                overflow: hidden;
            }
            .sidebar .sidebar-brand span,
            .sidebar .nav-item span,
            .sidebar .sidebar-footer .user-info .name,
            .sidebar .sidebar-footer .user-info .role {
                display: none;
            }
            .sidebar .sidebar-brand {
                justify-content: center;
                padding: 12px 0;
            }
            .sidebar .nav-item {
                justify-content: center;
                padding: 14px 0;
            }
            .sidebar .sidebar-footer {
                padding: 10px 0;
                text-align: center;
            }
            .sidebar .sidebar-footer .user-info {
                justify-content: center;
            }
            .main-content {
                padding: 16px;
            }
            .form-row,
            .form-row-3 {
                grid-template-columns: 1fr;
            }
            .auth-box {
                padding: 24px 18px;
            }
            .report-card {
                padding: 16px;
            }
            .report-card .rc-student {
                grid-template-columns: 1fr;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .stat-grid {
                grid-template-columns: 1fr;
            }
            .sidebar {
                width: 50px;
            }
            .main-content {
                padding: 12px;
            }
            .modal-box {
                padding: 20px 16px;
            }
        }

        /* ========== Print ========== */
        @media print {
            .sidebar,
            .btn,
            .no-print {
                display: none !important;
            }
            .main-content {
                padding: 0 !important;
                max-height: none !important;
            }
            .report-card {
                border: none;
                box-shadow: none;
                padding: 16px;
            }
            body {
                background: #fff;
            }
        }

        /* ========== Misc ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .empty-state i {
            font-size: 3rem;
            opacity: 0.4;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 1rem;
        }

        .alert {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .subject-tag {
            display: inline-block;
            padding: 2px 10px;
            background: var(--bg);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 2px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--primary-dark);
            color: #fff;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            animation: slideUp 0.3s ease;
            max-width: 360px;
        }
        .toast.success {
            background: var(--success);
        }
        .toast.error {
            background: var(--danger);
        }
        .toast.warning {
            background: var(--warning);
            color: var(--text);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- AUTH CONTAINER (Registration / Login)                        -->
    <!-- ============================================================ -->
    <div id="auth-container">
        <div class="auth-box" id="auth-box">
            <div class="logo">
                <i class="fas fa-school"></i>
                <h1>EduManage Uganda</h1>
                <p>Integrated School Management System</p>
            </div>

            <!-- Registration Form -->
            <div id="register-form">
                <h3 style="color:var(--primary-dark); margin-bottom:16px;">
                    <i class="fas fa-user-plus"></i> Register Your School
                </h3>
                <form id="registerForm">
                    <div class="form-group">
                        <label>School Name *</label>
                        <input class="form-control" id="reg-schoolName" placeholder="e.g. St. Mary's College" required />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Location / District *</label>
                            <input class="form-control" id="reg-location" placeholder="e.g. Kampala" required />
                        </div>
                        <div class="form-group">
                            <label>School Type *</label>
                            <select class="form-control" id="reg-type">
                                <option value="primary">Primary School</option>
                                <option value="secondary">Secondary School</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>School Email *</label>
                        <input class="form-control" id="reg-email" type="email" placeholder="admin@school.ug" required />
                    </div>
                    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;" />
                    <div class="form-group">
                        <label>Head Teacher Full Name *</label>
                        <input class="form-control" id="reg-htname" placeholder="e.g. Mr. John Ssempijja" required />
                    </div>
                    <div class="form-group">
                        <label>Head Teacher Password * <small>(min 6 characters)</small></label>
                        <input class="form-control" id="reg-htpass" type="password" placeholder="••••••" required minlength="6" />
                    </div>
                    <div class="form-group">
                        <label>Confirm Password *</label>
                        <input class="form-control" id="reg-htpass2" type="password" placeholder="••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-check-circle"></i> Register School
                    </button>
                </form>
                <div class="auth-toggle mt-2">
                    Already registered? <a id="goto-login">Sign In</a>
                </div>
            </div>

            <!-- Login Form -->
            <div id="login-form" class="hidden">
                <h3 style="color:var(--primary-dark); margin-bottom:16px;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </h3>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email (School or Teacher)</label>
                        <input class="form-control" id="login-email" type="email" placeholder="you@school.ug" required />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input class="form-control" id="login-pass" type="password" placeholder="••••••" required />
                    </div>
                    <button type="submit" class="btn btn-accent btn-block">
                        <i class="fas fa-arrow-right"></i> Sign In
                    </button>
                </form>
                <div class="auth-toggle mt-2">
                    New school? <a id="goto-register">Register Here</a>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- APP CONTAINER (Dashboard)                                    -->
    <!-- ============================================================ -->
    <div id="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-school"></i>
                <div>
                    EduManage Uganda
                    <span id="sidebar-school-type"></span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Nav items injected by JS -->
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar" id="sidebar-avatar">HT</div>
                    <div>
                        <div class="name" id="sidebar-user-name">User</div>
                        <div class="role" id="sidebar-user-role">Head Teacher</div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <!-- Page content rendered by JS -->
        </main>
    </div>

    <!-- ============================================================ -->
    <!-- MODAL PLACEHOLDER                                            -->
    <!-- ============================================================ -->
    <div id="modal-container"></div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT                                                   -->
    <!-- ============================================================ -->
    <script>
        // ======================================================================
        //  DATA LAYER  (localStorage)
        // ======================================================================
        const DB_KEY = 'uganda_sms_data';

        function getDB() {
            const raw = localStorage.getItem(DB_KEY);
            if (!raw) return null;
            try { return JSON.parse(raw); } catch { return null; }
        }

        function saveDB(data) {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
        }

        function initDB() {
            const existing = getDB();
            if (existing) return existing;
            const fresh = {
                school: null, // { name, location, type, email, htName, htPassword }
                teachers: [],
                classes: [],
                students: [],
                subjects: [],
                exams: [],
                marks: [],
                terms: [
                    { id: 't1', name: 'Term 1', active: true },
                    { id: 't2', name: 'Term 2', active: false },
                    { id: 't3', name: 'Term 3', active: false },
                ],
                currentTerm: 't1',
                currentYear: new Date().getFullYear(),
                nextIds: { teacher: 1, class: 1, student: 1, subject: 1, exam: 1, mark: 1 },
                session: null // { email, role, name }
            };
            saveDB(fresh);
            return fresh;
        }

        // Helpers
        function genId(prefix) {
            const db = getDB();
            const id = db.nextIds[prefix] || 1;
            db.nextIds[prefix] = id + 1;
            saveDB(db);
            return id;
        }

        function toast(msg, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const div = document.createElement('div');
            div.className = `toast ${type}`;
            div.innerHTML = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function modal(content, wide = false) {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
                    <div class="modal-box ${wide ? 'wide' : ''}">
                        <button class="modal-close" onclick="closeModal()">&times;</button>
                        ${content}
                    </div>
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('modal-container').innerHTML = '';
        }

        // ======================================================================
        //  AUTH
        // ======================================================================
        function showLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        }

        function showRegister() {
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
        }

        document.getElementById('goto-login').addEventListener('click', showLogin);
        document.getElementById('goto-register').addEventListener('click', showRegister);

        // Registration
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('reg-schoolName').value.trim();
            const loc = document.getElementById('reg-location').value.trim();
            const type = document.getElementById('reg-type').value;
            const email = document.getElementById('reg-email').value.trim();
            const ht = document.getElementById('reg-htname').value.trim();
            const pass = document.getElementById('reg-htpass').value;
            const pass2 = document.getElementById('reg-htpass2').value;

            if (!name || !loc || !email || !ht || !pass) {
                toast('Please fill all required fields.', 'error');
                return;
            }
            if (pass !== pass2) {
                toast('Passwords do not match.', 'error');
                return;
            }
            if (pass.length < 6) {
                toast('Password must be at least 6 characters.', 'error');
                return;
            }

            const db = getDB() || initDB();
            if (db.school) {
                toast('A school is already registered. Please login.', 'warning');
                return;
            }

            db.school = {
                name,
                location: loc,
                type,
                email,
                htName: ht,
                htPassword: pass
            };
            db.session = { email, role: 'headteacher', name: ht };
            saveDB(db);
            toast('School registered successfully!');
            enterApp();
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            const db = getDB();
            if (!db || !db.school) {
                toast('No school registered yet. Please register first.', 'error');
                return;
            }

            // Check headteacher
            if (email === db.school.email && pass === db.school.htPassword) {
                db.session = { email, role: 'headteacher', name: db.school.htName };
                saveDB(db);
                enterApp();
                return;
            }

            // Check teachers
            const teacher = db.teachers.find(t => t.email === email && t.password === pass);
            if (teacher) {
                db.session = { email, role: 'teacher', name: teacher.name };
                saveDB(db);
                enterApp();
                return;
            }

            toast('Invalid email or password.', 'error');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            const db = getDB();
            if (db) { db.session = null;
                saveDB(db); }
            document.getElementById('app-container').classList.remove('active');
            document.getElementById('auth-container').style.display = 'flex';
            document.getElementById('main-content').innerHTML = '';
            // Reset login fields
            document.getElementById('login-email').value = '';
            document.getElementById('login-pass').value = '';
            showLogin();
        });

        // ======================================================================
        //  ENTER APP
        // ======================================================================
        function enterApp() {
            const db = getDB();
            if (!db || !db.school || !db.session) {
                document.getElementById('auth-container').style.display = 'flex';
                return;
            }
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-container').classList.add('active');

            // Sidebar info
            document.getElementById('sidebar-school-type').textContent =
                db.school.type === 'primary' ? 'PRIMARY' : 'SECONDARY';
            document.getElementById('sidebar-user-name').textContent = db.session.name;
            document.getElementById('sidebar-user-role').textContent =
                db.session.role === 'headteacher' ? 'Head Teacher' : 'Teacher';
            document.getElementById('sidebar-avatar').textContent =
                db.session.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

            renderSidebar();
            navigateTo('dashboard');
        }

        // ======================================================================
        //  SIDEBAR NAVIGATION
        // ======================================================================
        function renderSidebar() {
            const db = getDB();
            const nav = document.getElementById('sidebar-nav');
            const isHT = db.session.role === 'headteacher';

            let items = [];
            items.push({ id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-pie' });

            if (isHT) {
                items.push({ id: 'teachers', label: 'Teachers', icon: 'fa-chalkboard-user' });
                items.push({ id: 'students', label: 'Students', icon: 'fa-user-graduate' });
                items.push({ id: 'classes', label: 'Classes', icon: 'fa-layer-group' });
                items.push({ id: 'subjects', label: 'Subjects', icon: 'fa-book-open' });
                items.push({ id: 'exams', label: 'Exams & Tests', icon: 'fa-pen-to-square' });
                items.push({ id: 'marks', label: 'All Marks', icon: 'fa-table' });
                items.push({ id: 'reports', label: 'Report Cards', icon: 'fa-file-alt' });
                items.push({ id: 'settings', label: 'Settings', icon: 'fa-cog' });
            } else {
                // Teacher
                items.push({ id: 'myclasses', label: 'My Classes', icon: 'fa-users' });
                items.push({ id: 'enter-marks', label: 'Enter Marks', icon: 'fa-pencil' });
                items.push({ id: 'reports', label: 'Report Cards', icon: 'fa-file-alt' });
            }

            nav.innerHTML = items.map(item =>
                `<div class="nav-item" data-page="${item.id}" onclick="navigateTo('${item.id}')">
                        <i class="fas ${item.icon}"></i>
                        <span>${item.label}</span>
                    </div>`
            ).join('');

            // Mark active
            const active = nav.querySelector('.nav-item.active');
            if (active) active.classList.remove('active');
        }

        function setNavActive(pageId) {
            const nav = document.getElementById('sidebar-nav');
            nav.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === pageId);
            });
        }

        // ======================================================================
        //  NAVIGATION DISPATCH
        // ======================================================================
        function navigateTo(page) {
            setNavActive(page);
            switch (page) {
                case 'dashboard':
                    renderDashboard();
                    break;
                case 'teachers':
                    renderTeachers();
                    break;
                case 'students':
                    renderStudents();
                    break;
                case 'classes':
                    renderClasses();
                    break;
                case 'subjects':
                    renderSubjects();
                    break;
                case 'exams':
                    renderExams();
                    break;
                case 'marks':
                    renderAllMarks();
                    break;
                case 'reports':
                    renderReports();
                    break;
                case 'settings':
                    renderSettings();
                    break;
                case 'myclasses':
                    renderMyClasses();
                    break;
                case 'enter-marks':
                    renderEnterMarks();
                    break;
                default:
                    renderDashboard();
            }
        }

        // ======================================================================
        //  RENDER ENGINE
        // ======================================================================
        function render(html) {
            document.getElementById('main-content').innerHTML = html;
        }

        // ======================================================================
        //  UNEB GRADING
        // ======================================================================
        function getGrade(score) {
            if (score === undefined || score === null || score === '') return { grade: '-', points: 0, remark: 'No score' };
            const s = Number(score);
            if (isNaN(s)) return { grade: '-', points: 0, remark: 'Invalid' };
            if (s >= 80) return { grade: 'A', points: 1, remark: 'Excellent' };
            if (s >= 70) return { grade: 'B', points: 2, remark: 'Very Good' };
            if (s >= 60) return { grade: 'C', points: 3, remark: 'Good' };
            if (s >= 50) return { grade: 'D', points: 4, remark: 'Fair' };
            if (s >= 40) return { grade: 'E', points: 5, remark: 'Weak' };
            return { grade: 'F', points: 6, remark: 'Fail' };
        }

        function gradeClass(grade) {
            if (!grade || grade === '-') return '';
            return 'grade-' + grade;
        }

        // ======================================================================
        //  DASHBOARD
        // ======================================================================
        function renderDashboard() {
            const db = getDB();
            const isHT = db.session.role === 'headteacher';
            const totalStudents = db.students.length;
            const totalTeachers = db.teachers.length;
            const totalClasses = db.classes.length;
            const totalExams = db.exams.length;
            const totalSubjects = db.subjects.length;

            let html = `
                <div class="page-header">
                    <h2><i class="fas fa-chart-pie"></i> Dashboard</h2>
                    <p>Welcome back, <strong>${db.session.name}</strong> — ${db.school.name} (${db.school.type})</p>
                </div>
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-graduate"></i></div><div class="stat-value">${totalStudents}</div><div class="stat-label">Students</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-chalkboard-user"></i></div><div class="stat-value">${totalTeachers}</div><div class="stat-label">Teachers</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-layer-group"></i></div><div class="stat-value">${totalClasses}</div><div class="stat-label">Classes</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-book-open"></i></div><div class="stat-value">${totalSubjects}</div><div class="stat-label">Subjects</div></div>
                    <div class="stat-card"><div class="stat-icon"><i class="fas fa-pen-to-square"></i></div><div class="stat-value">${totalExams}</div><div class="stat-label">Exams / Tests</div></div>
                </div>
            `;

            if (isHT) {
                html += `
                    <div class="card">
                        <div class="card-header"><h3><i class="fas fa-bolt"></i> Quick Actions</h3></div>
                        <div class="flex flex-wrap gap-2">
                            <button class="btn btn-primary" onclick="navigateTo('students')"><i class="fas fa-user-plus"></i> Manage Students</button>
                            <button class="btn btn-accent" onclick="navigateTo('teachers')"><i class="fas fa-user-plus"></i> Manage Teachers</button>
                            <button class="btn btn-outline" onclick="navigateTo('exams')"><i class="fas fa-pen-to-square"></i> Create Exam</button>
                            <button class="btn btn-outline" onclick="navigateTo('reports')"><i class="fas fa-file-alt"></i> Reports</button>
                        </div>
                    </div>
                `;
            } else {
                // Teacher quick actions
                html += `
                    <div class="card">
                        <div class="card-header"><h3><i class="fas fa-bolt"></i> Quick Actions</h3></div>
                        <div class="flex flex-wrap gap-2">
                            <button class="btn btn-primary" onclick="navigateTo('enter-marks')"><i class="fas fa-pencil"></i> Enter Marks</button>
                            <button class="btn btn-accent" onclick="navigateTo('myclasses')"><i class="fas fa-users"></i> My Classes</button>
                            <button class="btn btn-outline" onclick="navigateTo('reports')"><i class="fas fa-file-alt"></i> Report Cards</button>
                        </div>
                    </div>
                `;
            }

            // Recent activity
            html += `
                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-history"></i> System Info</h3></div>
                    <p><strong>School:</strong> ${db.school.name} | <strong>Location:</strong> ${db.school.location} | <strong>Type:</strong> ${db.school.type}</p>
                    <p><strong>Current Term:</strong> ${db.terms.find(t=>t.id===db.currentTerm)?.name || 'Term 1'} | <strong>Year:</strong> ${db.currentYear}</p>
                    <p><strong>Head Teacher:</strong> ${db.school.htName} | <strong>Email:</strong> ${db.school.email}</p>
                    <p class="mt-2"><em>Built for Uganda's Education System — UNEB Grading Scale</em></p>
                </div>
            `;

            render(html);
        }

        // ======================================================================
        //  TEACHERS MANAGEMENT (Head Teacher only)
        // ======================================================================
        function renderTeachers() {
            const db = getDB();
            if (db.session.role !== 'headteacher') { renderDashboard(); return; }

            let html = `
                <div class="page-header">
                    <h2><i class="fas fa-chalkboard-user"></i> Teachers Management</h2>
                    <p>Add, manage, and assign teachers. Head Teacher sets passwords.</p>
                </div>
                <button class="btn btn-primary mb-3" onclick="showAddTeacherModal()"><i class="fas fa-plus"></i> Add Teacher</button>
            `;

            if (db.teachers.length === 0) {
                html += `<div class="empty-state"><i class="fas fa-users"></i><p>No teachers added yet.</p></div>`;
            } else {
                html += `
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Classes</th><th>Subjects</th><th>Actions</th></tr></thead>
                            <tbody>
                                ${db.teachers.map((t, i) => `
                                    <tr>
                                        <td>${i+1}</td>
                                        <td><strong>${t.name}</strong></td>
                                        <td>${t.email}</td>
                                        <td>${(t.classIds||[]).map(cid => db.classes.find(c=>c.id===cid)?.name || '—').join(', ') || '—'}</td>
                                        <td>${(t.subjectIds||[]).map(sid => db.subjects.find(s=>s.id===sid)?.name || '—').join(', ') || '—'}</td>
                                        <td>
                                            <button class="btn btn-sm btn-outline" onclick="editTeacher(${t.id})"><i class="fas fa-edit"></i> Edit</button>
                                            <button class="btn btn-sm btn-danger" onclick="deleteTeacher(${t.id})"><i class="fas fa-trash"></i></button>
                                            <button class="btn btn-sm btn-accent" onclick="resetTeacherPass(${t.id})"><i class="fas fa-key"></i> Reset</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            render(html);
        }

        function showAddTeacherModal() {
            const db = getDB();
            const classOpts = db.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            const subjOpts = db.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

            modal(`
                <h3><i class="fas fa-user-plus"></i> Add Teacher</h3>
                <form id="addTeacherForm">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input class="form-control" id="t-name" required placeholder="e.g. Sarah Nakato" />
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input class="form-control" id="t-email" type="email" required placeholder="teacher@school.ug" />
                    </div>
                    <div class="form-group">
                        <label>Password * <small>(min 6 chars)</small></label>
                        <input class="form-control" id="t-pass" type="password" required minlength="6" />
                    </div>
                    <div class="form-group">
                        <label>Assign Classes (hold Ctrl to select multiple)</label>
                        <select class="form-control" id="t-classes" multiple size="3">${classOpts || '<option value="">No classes yet</option>'}</select>
                    </div>
                    <div class="form-group">
                        <label>Assign Subjects (hold Ctrl)</label>
                        <select class="form-control" id="t-subjects" multiple size="3">${subjOpts || '<option value="">No subjects yet</option>'}</select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Save Teacher</button>
                </form>
            `);

            document.getElementById('addTeacherForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const db = getDB();
                const name = document.getElementById('t-name').value.trim();
                const email = document.getElementById('t-email').value.trim();
                const pass = document.getElementById('t-pass').value;
                const classIds = Array.from(document.getElementById('t-classes').selectedOptions).map(o => Number(o.value));
                const subjectIds = Array.from(document.getElementById('t-subjects').selectedOptions).map(o => Number(o.value));

                if (!name || !email || !pass) { toast('Fill all fields.', 'error'); return; }
                if (db.teachers.find(t => t.email === email)) { toast('Email already used.', 'error'); return; }

                db.teachers.push({
                    id: genId('teacher'),
                    name,
                    email,
                    password: pass,
                    classIds,
                    subjectIds
                });
                saveDB(db);
                closeModal();
                toast('Teacher added successfully!');
                renderTeachers();
            });
        }

        function deleteTeacher(id) {
            if (!confirm('Delete this teacher?')) return;
            const db = getDB();
            db.teachers = db.teachers.filter(t => t.id !== id);
            saveDB(db);
            toast('Teacher removed.', 'warning');
            renderTeachers();
        }

        function editTeacher(id) {
            const db = getDB();
            const t = db.teachers.find(x => x.id === id);
            if (!t) return;
            const classOpts = db.classes.map(c =>
                `<option value="${c.id}" ${(t.classIds||[]).includes(c.id)?'selected':''}>${c.name}</option>`
            ).join('');
            const subjOpts = db.subjects.map(s =>
                `<option value="${s.id}" ${(t.subjectIds||[]).includes(s.id)?'selected':''}>${s.name}</option>`
            ).join('');

            modal(`
                <h3><i class="fas fa-edit"></i> Edit Teacher</h3>
                <form id="editTeacherForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input class="form-control" id="et-name" value="${t.name}" required />
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input class="form-control" id="et-email" type="email" value="${t.email}" required />
                    </div>
                    <div class="form-group">
                        <label>Assign Classes</label>
                        <select class="form-control" id="et-classes" multiple size="3">${classOpts || '<option value="">No classes</option>'}</select>
                    </div>
                    <div class="form-group">
                        <label>Assign Subjects</label>
                        <select class="form-control" id="et-subjects" multiple size="3">${subjOpts || '<option value="">No subjects</option>'}</select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Update</button>
                </form>
            `);

            document.getElementById('editTeacherForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const db = getDB();
                const teacher = db.teachers.find(x => x.id === id);
                if (!teacher) return;
                teacher.name = document.getElementById('et-name').value.trim();
                teacher.email = document.getElementById('et-email').value.trim();
                teacher.classIds = Array.from(document.getElementById('et-classes').selectedOptions).map(o => Number(o.value));
                teacher.subjectIds = Array.from(document.getElementById('et-subjects').selectedOptions).map(o => Number(o.value));
                saveDB(db);
                closeModal();
                toast('Teacher updated.');
                renderTeachers();
            });
        }

        function resetTeacherPass(id) {
            const db = getDB();
            const t = db.teachers.find(x => x.id === id);
            if (!t) return;
            const newPass = prompt(`Enter new password for ${t.name}:`, 'pass123');
            if (!newPass || newPass.length < 6) { toast('Password must be 6+ characters.', 'error'); return; }
            t.password = newPass;
            saveDB(db);
            toast('Password reset successfully!');
            renderTeachers();
        }

        // ======================================================================
        //  STUDENTS MANAGEMENT
        // ======================================================================
        function renderStudents() {
            const db = getDB();
            const isHT = db.session.role === 'headteacher';

            let html = `
                <div class="page-header">
                    <h2><i class="fas fa-user-graduate"></i> Students Management</h2>
                    <p>Register and manage all students.</p>
                </div>

        function promoteStudent(id) {
            const db = getDB();
            const s = db.students.find(x => x.id === id);
            if (!s) return;
            const currentClass = db.classes.find(c => c.id === s.classId);
            if (!currentClass) { toast('Student has no class.', 'error'); return; }

            // Determine next class based on naming
            const type = db.school.type;
            let nextName = '';

            if (type === 'primary') {
                const num = parseInt(currentClass.name.replace(/[^0-9]/g, ''));
                if (num && num < 7) {
                    nextName = 'Primary ' + (num + 1);
                } else {
                    toast('Student has completed Primary level! Consider marking as graduated.', 'warning');
                    return;
                }
            } else {
                // Secondary: S1 -> S2 -> S3 -> S4 -> S5 -> S6
                const match = currentClass.name.match(/S(\d)/);
                if (match) {
                    const num = parseInt(match[1]);
                    if (num < 6) {
                        nextName = 'S' + (num + 1);
                    } else {
                        toast('Student has completed S6! Graduated.', 'warning');
                        return;
                    }
                } else {
                    toast('Cannot determine next class. Please manually edit.', 'error');
                    return;
                }
            }

            const nextClass = db.classes.find(c => c.name === nextName);
            if (!nextClass) {
                toast(`Class "${nextName}" does not exist. Please create it first.`, 'error');
                return;
            }

            s.classId = nextClass.id;
            saveDB(db);
            toast(`Promoted to ${nextName}!`);
            renderStudents();
        }
